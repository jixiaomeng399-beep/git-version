<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>图像识别</title>
</head>
<body>
  <button onclick="loadModel()">加载模型</button>
  <button onclick="startCam()">开始摄像头</button>
  <button onclick="stopCam()">停止</button>
  <div id="webcamPlace"></div>
  <div id="result"></div>

  <script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://unpkg.com/@teachablemachine/image@0.12.4/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/ak94mlyoW/";
    let model, webcam, loop;

    async function loadModel() {
      alert("开始加载模型...");
      model = await tmImage.load(URL + "model.json", URL + "metadata.json");
      alert("模型加载成功！");
    }

    async function startCam() {
      if (!model) return alert("先点加载模型");
      webcam = new tmImage.Webcam(400, 400, true);
      await webcam.setup();
      await webcam.play();
      document.getElementById("webcamPlace").appendChild(webcam.canvas);
      loop = requestAnimationFrame(loopPredict);
    }

    function stopCam() {
      webcam.stop();
      cancelAnimationFrame(loop);
    }

    async function loopPredict() {
      webcam.update();
      const predictions = await model.predict(webcam.canvas);
      let str = "";
      for (let p of predictions) {
        str += p.className + "：" + (p.probability * 100).toFixed(1) + "%<br>";
      }
      document.getElementById("result").innerHTML = str;
      loop = requestAnimationFrame(loopPredict);
    }
  </script>
</body>
</html>
