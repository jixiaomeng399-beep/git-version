<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachable Machine 이미지 인식</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #333;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
      max-width: 800px;
      width: 100%;
      padding: 40px;
      backdrop-filter: blur(10px);
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 700;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
      font-size: 1.1rem;
      font-weight: 300;
    }

    .section {
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.2rem;
      color: #667eea;
      margin-bottom: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
    }

    .section-title::before {
      content: '🎯';
      margin-right: 10px;
    }

    .url-display {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      word-break: break-all;
      color: #495057;
      border: 1px solid #e9ecef;
    }

    .controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      min-width: 140px;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    button:active {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-success {
      background: linear-gradient(135deg, #4ecdc4, #44a08d);
      color: white;
    }

    .btn-danger {
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
      color: white;
    }

    .btn-secondary {
      background: linear-gradient(135deg, #a8a8a8, #8c8c8c);
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    button:disabled:hover {
      transform: none;
      box-shadow: none;
    }

    .webcam-container {
      display: flex;
      justify-content: center;
      margin: 30px 0;
      min-height: 400px;
      align-items: center;
    }

    #webcamPlace {
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      background: #000;
      display: none;
      max-width: 100%;
    }

    #webcamPlace canvas {
      display: block;
      border-radius: 15px;
    }

    .results {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 25px;
      min-height: 200px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 15px;
      margin-bottom: 10px;
      background: white;
      border-radius: 10px;
      border-left: 4px solid #667eea;
      transition: all 0.3s ease;
    }

    .result-item:hover {
      transform: translateX(5px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .result-item:last-child {
      margin-bottom: 0;
    }

    .class-name {
      font-weight: 600;
      color: #333;
      font-size: 1.1rem;
    }

    .probability {
      color: #667eea;
      font-weight: 700;
      font-size: 1.2rem;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e9ecef;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    .status {
      text-align: center;
      padding: 20px;
      color: #666;
      font-style: italic;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
        margin: 10px;
      }

      h1 {
        font-size: 2rem;
      }

      .controls {
        flex-direction: column;
        align-items: center;
      }

      button {
        width: 100%;
        max-width: 300px;
      }

      .webcam-container {
        min-height: 300px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.8rem;
      }

      .container {
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 Teachable Machine</h1>
    <p class="subtitle">실시간 이미지 인식을 위한 AI 기반 웹 애플리케이션</p>

    <div class="section">
      <div class="section-title">모델 설정</div>
      <div class="url-display" id="modelUrl"></div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="loadBtn" onclick="loadModel()">모델 로드</button>
      <button class="btn-success" id="startBtn" onclick="startCam()" disabled>카메라 시작</button>
      <button class="btn-danger" id="stopBtn" onclick="stopCam()" disabled>중지</button>
    </div>

    <div class="webcam-container">
      <div id="webcamPlace"></div>
    </div>

    <div class="results" id="results">
      <div class="status" id="status">먼저 모델을 로드해주세요.</div>
    </div>
  </div>

  <script src="https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://unpkg.com/@teachablemachine/image@0.12.4/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/ak94mlyoW/";
    let model, webcam, loop;
    let isModelLoaded = false;
    let isRunning = false;

    // 초기화
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('modelUrl').textContent = URL;
    });

    async function loadModel() {
      const loadBtn = document.getElementById('loadBtn');
      const status = document.getElementById('status');

      loadBtn.disabled = true;
      loadBtn.innerHTML = '<span class="loading"></span>로딩 중...';
      status.innerHTML = '<span class="loading"></span>모델을 로드하는 중입니다...';

      try {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        isModelLoaded = true;

        loadBtn.innerHTML = '✓ 모델 로드됨';
        loadBtn.className = 'btn-secondary';
        document.getElementById('startBtn').disabled = false;
        status.innerHTML = '✅ 모델 로드 성공! 카메라를 시작할 수 있습니다.';
      } catch (error) {
        console.error('모델 로드 오류:', error);
        loadBtn.disabled = false;
        loadBtn.innerHTML = '모델 로드';
        status.innerHTML = '❌ 모델 로드 실패: ' + error.message;
      }
    }

    async function startCam() {
      if (!isModelLoaded) {
        document.getElementById('status').innerHTML = '⚠️ 먼저 모델을 로드해주세요.';
        return;
      }

      const startBtn = document.getElementById('startBtn');
      const stopBtn = document.getElementById('stopBtn');
      const status = document.getElementById('status');

      startBtn.disabled = true;
      stopBtn.disabled = false;
      status.innerHTML = '<span class="loading"></span>카메라를 시작하는 중...';

      try {
        webcam = new tmImage.Webcam(400, 400, true);
        await webcam.setup();
        await webcam.play();

        document.getElementById("webcamPlace").appendChild(webcam.canvas);
        document.getElementById("webcamPlace").style.display = 'block';

        isRunning = true;
        loop = requestAnimationFrame(loopPredict);

        status.innerHTML = '🎥 카메라가 시작되었습니다. 예측 중...';
      } catch (error) {
        console.error('카메라 시작 오류:', error);
        startBtn.disabled = false;
        stopBtn.disabled = true;
        status.innerHTML = '❌ 카메라 시작 실패: ' + error.message;
      }
    }

    function stopCam() {
      if (webcam) {
        webcam.stop();
      }
      isRunning = false;
      cancelAnimationFrame(loop);

      document.getElementById("webcamPlace").style.display = 'none';
      document.getElementById("webcamPlace").innerHTML = '';

      document.getElementById('startBtn').disabled = false;
      document.getElementById('stopBtn').disabled = true;
      document.getElementById('status').innerHTML = '⏹️ 카메라가 중지되었습니다.';
    }

    async function loopPredict() {
      if (!isRunning) return;

      webcam.update();
      const predictions = await model.predict(webcam.canvas);

      const resultsDiv = document.getElementById('results');
      resultsDiv.innerHTML = '';

      predictions.forEach(prediction => {
        const probability = (prediction.probability * 100).toFixed(1);
        const progressWidth = (prediction.probability * 100) + '%';

        const itemDiv = document.createElement('div');
        itemDiv.className = 'result-item';
        itemDiv.innerHTML = `
          <div class="class-name">${prediction.className}</div>
          <div class="probability">${probability}%</div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressWidth}"></div>
          </div>
        `;
        resultsDiv.appendChild(itemDiv);
      });

      loop = requestAnimationFrame(loopPredict);
    }
  </script>
</body>
</html>
  </script>
</body>
</html>
